name: Manual Deployment (Webhook Test)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ github.event.inputs.environment }}';
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: environment,
              description: `Deployment to ${environment} environment`,
              production_environment: environment === 'prod',
              required_contexts: [],
              auto_merge: false
            });
            core.setOutput('deployment_id', deployment.data.id);
            console.log('Created deployment:', deployment.data.id);

      - name: Update Deployment Status (in_progress)
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = ${{ steps.deployment.outputs.deployment_id }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment_id,
              state: 'in_progress',
              description: 'Deployment in progress',
              environment_url: 'http://localhost:8080',
              auto_inactive: false
            });

      - name: Update Deployment Status (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = ${{ steps.deployment.outputs.deployment_id }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment_id,
              state: 'success',
              description: 'Deployment succeeded',
              environment_url: 'http://localhost:8080',
              auto_inactive: false
            });

      - name: Update Deployment Status (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment_id = ${{ steps.deployment.outputs.deployment_id }};
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment_id,
              state: 'failure',
              description: 'Deployment failed',
              auto_inactive: false
            });

      - name: Print deployment info
        run: |
          echo "Deployment created for environment: ${{ github.event.inputs.environment }}"
          echo "Deployment ID: ${{ steps.deployment.outputs.deployment_id }}"
          echo "GitHub webhook should have fired with deployment event"
          echo "Check your Cloud Run proxy logs for the incoming event"
